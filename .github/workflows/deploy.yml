name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          docker build -t portfolio .
          docker tag portfolio:latest ${{ secrets.ECR_REGISTRY }}/portfolio:latest
          docker push ${{ secrets.ECR_REGISTRY }}/portfolio:latest

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1
        with:
          host:        ${{ secrets.EC2_HOST }}
          username:    ${{ secrets.EC2_USER }}
          key:         ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
              docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}
            docker pull ${{ secrets.ECR_REGISTRY }}/portfolio:latest
            docker stop portfolio || true
            docker rm portfolio   || true
            docker run -d --name portfolio --restart unless-stopped -p 3000:3000 \
              ${{ secrets.ECR_REGISTRY }}/portfolio:latest
